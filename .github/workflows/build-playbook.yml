name: Build Playbook

on:
  push:
    branches: [main, master]
    paths:
      - "paper2skills-vault/**"
      - "paper2skills-skills/playbook-generator/**"
      - "paper2skills-skills/paper-workflow/definitions/**"
      - "paper2skills-skills/paper-skills-graph/**"
      - "paper2skills_common/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Build Playbook
        run: |
          python3 paper2skills-skills/playbook-generator/scripts/build_playbook.py \
            --root . \
            --vault paper2skills-vault \
            --out playbook
          cat playbook/build-report.json

      - name: Commit updated playbook
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add playbook/
          git diff --cached --quiet || git commit -m "chore: rebuild playbook [skip ci]"
          git push
