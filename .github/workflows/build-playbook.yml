name: Build & Deploy Playbook

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

"on":
  push:
    branches: [main, master]
    paths:
      - "paper2skills-vault/**"
      - "paper2skills-skills/playbook-generator/**"
      - "paper2skills-skills/paper-workflow/definitions/**"
  pull_request:
    branches: [main, master]
    paths:
      - "paper2skills-vault/**"
      - "paper2skills-skills/playbook-generator/**"
      - "paper2skills-skills/paper-workflow/definitions/**"
  workflow_dispatch:

jobs:
  # ── Job 1: Validate ──────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pyyaml

      - name: Syntax-check build_playbook.py
        run: |
          python3 -c "
          import ast, sys
          src = open('paper2skills-skills/playbook-generator/scripts/build_playbook.py').read()
          try:
              ast.parse(src)
              print('OK build_playbook.py syntax OK')
          except SyntaxError as e:
              print(f'FAIL SyntaxError at line {e.lineno}: {e.msg}')
              sys.exit(1)
          "

      - name: Check SyntaxWarnings
        run: |
          python3 -W error::SyntaxWarning -c "
          import warnings
          warnings.filterwarnings('error', category=SyntaxWarning)
          with open('paper2skills-skills/playbook-generator/scripts/build_playbook.py') as f:
              src = f.read()
          compile(src, 'build_playbook.py', 'exec')
          print('OK 0 SyntaxWarnings')
          "

      - name: Validate skill_ps_override.yaml (no duplicates)
        run: |
          python3 -c "
          import sys
          from collections import Counter
          with open('paper2skills-skills/playbook-generator/scripts/config/skill_ps_override.yaml') as f:
              lines = [l.strip() for l in f if l.strip() and not l.strip().startswith('#') and ':' in l and not l.strip().startswith('-')]
          keys = [l.split(':')[0].strip() for l in lines]
          dups = {k: v for k, v in Counter(keys).items() if v > 1}
          if dups:
              print(f'FAIL Duplicate ps_override keys: {list(dups.keys())}')
              sys.exit(1)
          print(f'OK skill_ps_override.yaml: {len(lines)} entries, 0 duplicates')
          "

      - name: Validate handbook_map.yaml (no duplicates)
        run: |
          python3 -c "
          import sys, re
          from collections import Counter
          with open('paper2skills-skills/playbook-generator/scripts/config/skill_handbook_map.yaml') as f:
              content = f.read()
          keys = re.findall(r'^(Skill-[^\s:]+):', content, re.MULTILINE)
          dups = {k: v for k, v in Counter(keys).items() if v > 1}
          if dups:
              print(f'FAIL Duplicate handbook_map keys: {list(dups.keys())}')
              sys.exit(1)
          print(f'OK skill_handbook_map.yaml: {len(set(keys))} unique Skills, 0 duplicates')
          "

      - name: Count vault Skills (sanity gate)
        run: |
          python3 -c "
          import glob, sys
          skills = glob.glob('paper2skills-vault/*/Skill-*.md')
          print(f'OK Vault Skills: {len(skills)}')
          if len(skills) < 400:
              print(f'FAIL Too few Skills ({len(skills)} < 400)')
              sys.exit(1)
          "

  # ── Job 2: Build ─────────────────────────────────────────────────────────
  build:
    name: Build Playbook
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install pyyaml
          pip install -r paper2skills-skills/playbook-generator/requirements.txt

      - name: Build Playbook
        env:
          P2S_FEISHU_WEBHOOK_URL: ${{ secrets.P2S_FEISHU_WEBHOOK_URL }}
        run: |
          python3 paper2skills-skills/playbook-generator/scripts/build_playbook.py \
            --root . \
            --vault paper2skills-vault \
            --out playbook
          cat playbook/build-report.json

      - name: Verify build output
        run: |
          python3 -c "
          import os, sys, json
          required = [
              'playbook/index.html',
              'playbook/agents.html',
              'playbook/agent-report.html',
              'playbook/ai-roadmap.html',
              'playbook/chat.html',
              'playbook/build-report.json',
          ]
          missing = [f for f in required if not os.path.exists(f)]
          if missing:
              print(f'FAIL Missing files: {missing}')
              sys.exit(1)
          report = json.load(open('playbook/build-report.json'))
          sp = report.get('skill_pages', 0)
          d  = report.get('domains', 0)
          e  = report.get('edges', 0)
          print(f'OK Build: {sp} Skills / {d} domains / {e} edges')
          if sp < 400 or d < 20:
              print(f'FAIL Build metrics below threshold')
              sys.exit(1)
          total_html = sum(1 for r,ds,fs in os.walk('playbook') for f in fs if f.endswith('.html'))
          print(f'OK {total_html} HTML pages generated')
          "

      - name: Upload playbook artifact
        uses: actions/upload-artifact@v4
        with:
          name: playbook-${{ github.sha }}
          path: playbook/
          retention-days: 7

  # ── Job 3: Deploy (main push only) ───────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download playbook artifact
        uses: actions/download-artifact@v4
        with:
          name: playbook-${{ github.sha }}
          path: playbook/

      - name: Package playbook
        run: |
          cd playbook
          tar -czf /tmp/pb_ci.tar.gz \
            assets/ domains/ graph/ playbooks/ topics/ workflows/ skills/ \
            agents.html agent-report.html ai-roadmap.html index.html chat.html \
            build-report.json README.md
          echo "Package size: $(du -sh /tmp/pb_ci.tar.gz | cut -f1)"

      - name: Deploy via SSH + rsync
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "$DEPLOY_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -avz --timeout=60 \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            /tmp/pb_ci.tar.gz ubuntu@${DEPLOY_HOST}:/tmp/
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@${DEPLOY_HOST} "
            rm -rf /opt/paper2skills/html/*
            tar -xzf /tmp/pb_ci.tar.gz -C /opt/paper2skills/html/
            rm /tmp/pb_ci.tar.gz
            echo deployed: \$(find /opt/paper2skills/html -type f | wc -l) files
          "
          rm -f /tmp/deploy_key

      - name: Smoke test production URL
        run: |
          python3 -c "
          import urllib.request, ssl, json, sys
          ctx = ssl.create_default_context()
          try:
              r = json.loads(urllib.request.urlopen(
                  'https://skills.lute-tlz-dddd.top/build-report.json',
                  timeout=15, context=ctx).read())
              print(f'OK Live: {r[\"skill_pages\"]} Skills / {r[\"domains\"]} domains / {r[\"edges\"]} edges')
          except Exception as e:
              print(f'FAIL Smoke test: {e}')
              sys.exit(1)
          "
