      - generic [ref=e111]:
        - generic [ref=e112]:
          - heading "1. 解决的问题" [level=2] [ref=e113]
          - paragraph [ref=e114]: FBA 月账单 15 万元但不知道哪些 SKU 费用异常——五层费用拆解（头程/仓储/长库龄/移仓/退货）到 SKU 粒度，长库龄 270 天提前预警，年化减少 LTSF 5-20 万元
          - heading "2. 核心算法逻辑" [level=2] [ref=e115]
          - paragraph [ref=e116]: 核心思想：FBA 费用是跨境卖家最大的隐性成本之一，包含头程运费、FBA 仓储费、长库龄附加费、移仓费、退货处理费五层结构。大多数团队只看月度账单总额，无法做 SKU 级归因。FBA Fee Intelligence 将费用拆解到 SKU 粒度，识别费用异常并触发预警。
          - heading "3. 业务应用场景" [level=2] [ref=e117]
          - paragraph [ref=e118]: 业务痛点：某母婴品牌月度 FBA 账单 15 万元，但不知道哪些 SKU 的费用占比异常高。人工核查需要 2-3 天，等发现长库龄时已经产生了 LTSF。
          - paragraph [ref=e119]: "应用流程： 1. 从 Amazon SP API 拉取 `GET_FBA_MYI_UNSUPPRESSED_INVENTORY_DATA` 报告 2. 逐 ASIN 计算五层费用结构 3. 识别费用率 > 25% GMV 的异常 SKU（行业健康值 < 15%） 4. 触发长库龄预警，生成清仓/转 FBM 建议"
          - paragraph [ref=e120]: 典型发现： - 婴儿推车（大件）：仓储费占 GMV 18%，高于均值 → 建议减少 FBA 库存深度，改用第三方仓调拨 - 奶嘴套装（滞销）：库龄 310 天，预计 55 天后触发 LTSF → 立即以成本价清仓，避免 LTSF 2400 元/月
          - heading "4. 输入数据要求" [level=2] [ref=e121]
          - paragraph [ref=e122]: 请查看原始代码模板获取输入规格。
          - heading "5. 输出结果" [level=2] [ref=e123]
          - paragraph [ref=e124]: 请查看原始代码模板获取输出规格。
          - heading "6. 业务价值 / ROI" [level=2] [ref=e125]
          - paragraph [ref=e126]: 5-20 万元
          - heading "7. 代码模板" [level=2] [ref=e127]
          - paragraph [ref=e128]: 代码块数量：3 · 路径：未检测到
          - generic [ref=e129]:
            - button "复制" [ref=e130] [cursor=pointer]
            - code [ref=e132]: "from dataclasses import dataclass from datetime import date @dataclass class FBAInventoryRecord: asin: str sku: str units: int cubic_feet: float days_in_storage: int price: float monthly_units_sold: int def compute_fba_fees(rec: FBAInventoryRecord, is_peak_season: bool = False) -> dict: storage_rate = 2.40 if is_peak_season else 0.87 monthly_storage = rec.cubic_feet * rec.units * storage_rate ltsf = 0.0 if rec.days_in_storage > 365: ltsf = rec.cubic_feet * rec.units * 6.90 monthly_revenue = rec.price * rec.monthly_units_sold total_fee = monthly_storage + ltsf fee_pct = (total_fee / monthly_revenue * 100) if monthly_revenue > 0 else 0.0 alert = \"green\" if rec.days_in_storage > 330: alert = \"red\" elif rec.days_in_storage > 270: alert = \"orange\" elif fee_pct > 25: alert = \"yellow\" return { \"asin\": rec.asin, \"monthly_storage_fee\": round(monthly_storage, 2), \"ltsf\": round(ltsf, 2), \"total_fee_cny\": round(total_fee * 7.2, 0), \"fee_pct_of_revenue\": round(fee_pct, 1), \"days_in_storage\": rec.days_in_storage, \"alert\": alert, \"recommendation\": ( \"立即移仓或清仓\" if alert == \"red\" else \"预警: 90天内触发LTSF，建议清仓\" if alert == \"orange\" else \"费用率偏高，检查定价或减少备货\" if alert == \"yellow\" else \"健康\" ), } inventory = [ FBAInventoryRecord(\"B08XY\", \"PUMP-S1\", 200, 0.5, 45, 89.99, 150), FBAInventoryRecord(\"B09AB\", \"CART-L1\", 50, 8.0, 310, 299.99, 10), FBAInventoryRecord(\"B07CD\", \"NIPP-S3\", 500, 0.1, 340, 12.99, 5), ] print(f\"{'ASIN':<8} {'天数':>5} {'仓储费$':>8} {'LTSF$':>7} {'费率%':>6} {'状态':<8} 建议\") print(\"-\" * 75) for rec in inventory: r = compute_fba_fees(rec) print(f\"{r['asin']:<8} {r['days_in_storage']:>5} {r['monthly_storage_fee']:>8} \" f\"{r['ltsf']:>7} {r['fee_pct_of_revenue']:>6} {r['alert']:<8} {r['recommendation']}\")"
