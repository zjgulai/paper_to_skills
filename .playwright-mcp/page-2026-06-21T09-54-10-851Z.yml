          - paragraph [ref=e63]: Amazon 自然排名 + 广告协同的全链路搜索流量增长路线图
          - generic [ref=e64]: 搜索排名 · 关键词 · 广告协同
      - generic [ref=e65]: Amazon 上 70% 的点击发生在搜索结果首页，但大多数卖家的搜索策略是：广告组靠感觉出价、自然排名靠运气等待、关键词靠竞品标题抄。这三个「靠感觉」导致：广告预算浪费 30-40%、自然流量占比长期在 35% 以下、新品冷启动成本高居不下。真正的搜索增长是「广告-自然双轨协同」——广告快速建立排名信号，自然排名成熟后反哺广告降本。本手册提供从关键词矩阵搭建到广告-自然联动出价的完整执行路径。
