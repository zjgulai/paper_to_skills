        - 'link "02-A_B实验 CUPED Variance Reduction（方差缩减） CUPED (Controlled-experiment Using Pre-Experiment Data) 用实验前数据作为协变量，减少实验组间方差，使同样的样本量能检测到更小的效应量。核心公式：$Y_{cuped} = \\bar{Y} - \\theta(\\bar{X} - \\mu_X)$，其中 $X$ 是实验前同一用户的指标值，$\\theta = \\text{Cov}(Y,X)/\\text{Var}(X)$。方差缩减率 $\\approx 1 - \\rho^2_{Y,X}$。若实验前购买金额 加速实验迭代，隐性价值" [ref=e235] [cursor=pointer]':
