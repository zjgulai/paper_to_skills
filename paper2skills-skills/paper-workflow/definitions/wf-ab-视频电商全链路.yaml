id: wf-ab
name: WF-AB 视频电商全链路增长
description: 从内容选题到商品标签化再到MAS自动优化的TikTok/Reels视频电商完整链路，覆盖内容策划、AI生成、商品标签、数据分析四个阶段。
target_users:
- 视频内容运营
- TikTok Shop 负责人
- 短视频营销经理
- 品牌内容总监
entry_question: 你的视频电商当前最大瓶颈是：内容产出量不够？商品关联率低？还是数据追踪不清？
steps:
- id: step-1
  name: AI驱动内容选题与生产
  question: 是否有系统化的内容选题和批量生产能力？
  context: 视频电商的核心是内容量×质量×时机，MAS多智能体系统可将内容生产从人工3小时/篇压缩到10分钟/篇
  branches:
  - condition: 内容产量不足，需规模化生产
    skills:
    - id: Skill-MAS-Video-Content-Optimization
      role: 多智能体视频内容优化，自动选题+脚本+发布+分析全链路，爆款率从5%提升至18%
    - id: Skill-AI-Content-Marketing-Growth
      role: AIGC内容矩阵，月均200篇成本12元/篇vs人工400元，年化ROI 7倍
    - id: Skill-AI-Video-Script-Generation
      role: AI视频脚本生成，针对母婴用户痛点的Hook+痛点+解决方案结构
  - condition: 已有内容，需提升转化效率
    skills:
    - id: Skill-TikTok-Hook-Optimizer
      role: TikTok Hook优化器，前3秒留存率决定算法推流权重
    - id: Skill-Reward-Model-RLHF-Ecommerce
      role: RLHF奖励模型对齐母婴用户偏好，筛选最优内容版本提升转化率18%
- id: step-2
  name: 商品识别与购物链接标签化
  question: 视频中的商品是否已准确识别并关联到SKU？
  context: 无商品标签的视频是流量浪费，每增加一个有效购物链接平均提升15%的变现效率
  skills:
  - id: Skill-Tag-Video-Commerce-Tagging
    role: 视频商品自动标签，多模态LLM识别准确率88%，节省75%人工打标时间
  - id: Skill-Listing-Quality-Scoring
    role: 商品详情页质量评分，确保被标签商品的转化能力达标
  - id: Skill-LLM-as-Judge-Evaluator
    role: LLM质检视频-商品匹配度，防止错误关联损害用户体验
- id: step-3
  name: 内容归因与ROI测量
  question: 如何量化每条视频对销售的真实贡献？
  context: 平台自带的Last-Click归因高估TikTok贡献20-30%，需要因果方法获得真实增量
  branches:
  - condition: 需要精确内容归因
    skills:
    - id: Skill-DataAgent-Marketing-Attribution
      role: 对话式营销归因Agent，10分钟生成多渠道归因报告，支持即兴追问
    - id: Skill-Geo-Holdout-Experiment
      role: Geo地理控制实验，揭示平台归因虚高12pp，获得真实广告增量
  - condition: 需要ROI决策支持
    skills:
    - id: Skill-Causal-Time-Series-CausalImpact
      role: CausalImpact时序因果，量化内容发布对销量的真实冲击（去除季节趋势）
    - id: Skill-Search-Revenue-Attribution
      role: 搜索流量财务归因，将视频带来的有机搜索增量换算为P&L利润贡献
- id: step-4
  name: 数据驱动持续优化
  question: 如何建立内容→数据→优化的自动化闭环？
  context: 优秀的视频电商运营需要3小时迭代周期而非3天，Agent自动化是核心
  skills:
  - id: Skill-Growth-DataAgent-Analytics
    role: 增长DataAgent，5分钟自动诊断激活/转化率异常，告别人工排查2天
  - id: Skill-Interleaving-Experiment-Recommendation
    role: 交错实验快速评估内容版本效果，比标准A/B快30倍
  - id: Skill-Multi-Metric-Experiment-Tradeoff
    role: 多指标实验权衡，同时优化观看率/CTR/GMV避免单指标陷阱
