id: wf-j
name: WF-J DTC 独立站增长
description: 从多触点获客归因到千人千面推荐再到成交转化的独立站全链路增长决策。
target_users:
- DTC 独立站运营
- 数字营销负责人
- 品牌电商总监
entry_question: 独立站当前最大的增长瓶颈是什么？
steps:
- id: step-1
  name: 多触点获客归因
  question: 哪些渠道真正带来了高价值用户？
  context: 打破 Last-Click 误判，找到真实高 ROI 渠道
  branches:
  - condition: 多渠道投放（TikTok+Google+Email）
    skills:
    - id: Skill-DTC-Customer-Acquisition-Attribution
      role: Shapley 多触点因果归因，揭示各渠道真实贡献
    - id: Skill-KOL-ROI-Causal-Attribution
      role: KOL 带货因果归因，区分增量 vs 自然购买
    - id: Skill-Channel-Saturation-Curve
      role: 渠道饱和曲线，找到各渠道最优投放点
  - condition: 新市场进入（首次投放）
    skills:
    - id: Skill-GEO-Generative-Engine-Optimization
      role: 生成式引擎优化，覆盖 AI 搜索流量
    - id: Skill-Long-Tail-Search-Embedding-SEO
      role: 长尾词 SEO，低竞争高转化流量
    - id: Skill-Marketing-Mix-Modeling
      role: MMM 预算分配，确定首批渠道权重
- id: step-2
  name: 千人千面个性化
  question: 是否已有足够的用户行为数据支撑个性化？
  context: 从统一展示到个性化驱动 CTR 和 CVR 提升
  branches:
  - condition: 有历史购买数据（>1000 用户）
    skills:
    - id: Skill-LLM-Session-Personalization-Cache
      role: 三层意图缓存，千人千面首页和搜索
    - id: Skill-Price-Sensitive-Personalized-Recommendation
      role: 价格感知推荐，按用户价格档位差异化
    - id: Skill-VOC-Driven-Recommendation-Signal
      role: 评论偏好注入推荐，CVR 提升 8-15%
  - condition: 数据冷启动（新站 / 新市场）
    skills:
    - id: Skill-Federated-Cross-Seller-Recommendation
      role: 联邦推荐，多卖家协作无需共享数据
    - id: Skill-Cold-Start-Product-Recommendation
      role: 冷启动推荐，少量数据即可个性化
- id: step-3
  name: 成交转化优化
  question: 哪个环节的转化漏斗损失最大？
  context: 从购买意图识别到最终成交的完整转化优化
  branches:
  - condition: 购物车弃置率高（>70%）
    skills:
    - id: Skill-Purchase-Intent-Prediction
      role: 买家意图预测，只对高意图用户发挽回
    - id: Skill-LLM-Negotiation-Conversion-Agent
      role: 客服成交 Agent，隐偏好推断分层让步
    - id: Skill-Causal-Uplift-Modeling
      role: 因果提升建模，识别可说服者
  - condition: 付款流程转化低
    skills:
    - id: Skill-Price-Elasticity-Estimation
      role: 价格弹性估算，找到不损利润的促转化定价
    - id: Skill-AB-Experimental-Design
      role: A/B 实验设计，快速验证页面优化
- id: step-4
  name: 用户生命周期经营
  question: 如何提升用户复购和 LTV？
  context: 从首单到长期留存的用户价值最大化
  branches:
  - condition: 复购率低（< 20%）
    skills:
    - id: Skill-LTV-Prediction-BTYD
      role: BG/NBD 模型区分沉睡用户和真正流失
    - id: Skill-Customer-Churn-Prediction
      role: 流失预测，提前 14 天触达高危用户
    - id: Skill-Cross-Cultural-VOC-Alignment
      role: 跨语言评论分析，多市场用户洞察
outcomes:
- 渠道归因准确率提升，停止无效渠道烧钱
- 首页 CTR 从 2.3% 提升到 4-5%（千人千面）
- 弃购挽回 CVR 从 4% → 12-18%（精准触达）
- 用户 LTV 提升 20-30%（精准复购运营）
