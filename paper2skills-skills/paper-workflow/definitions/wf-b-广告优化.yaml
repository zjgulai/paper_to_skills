id: wf-b
name: WF-B 广告优化
description: 从归因诊断到预算分配的完整广告优化决策链，覆盖因果归因、人群精准化与自动竞价三个核心阶段。
target_users:
- 数据科学家
- 广告投放运营
- 增长负责人
entry_question: 你当前最迫切的广告优化目标是什么？
steps:
- id: step-1
  name: 归因诊断
  question: 你的渠道归因可信吗？
  context: 判断现有归因是否存在混淆偏差，是否需要因果化处理
  branches:
  - condition: 有 A/B 实验数据（处理组 / 控制组）
    skills:
    - id: Skill-DiD-Difference-in-Differences
      role: 估计干预净效应（政策/入驻前后对比）
    - id: Skill-Switchback-Experiment-Design
      role: 双边市场 / 物流场景的实验设计
    next: step-2
  - condition: 仅有观测数据，无实验
    skills:
    - id: Skill-IV-Instrumental-Variables
      role: 工具变量法处理价格内生性
    - id: Skill-Causal-Attribution-Bridge
      role: 因果归因替代 naive 相关性归因
    - id: Skill-Causal-Discovery-PC-Algorithm
      role: 自动发现渠道间因果结构
    next: step-2
  - condition: 多渠道归因窗口冲突（MTA）
    skills:
    - id: Skill-PIE-Experimental-MTA
      role: 实验驱动的多触点归因
    - id: Skill-FrontDoor-Causal-MTA
      role: 前门准则多触点因果归因
    - id: Skill-CDA-Privacy-Causal-Attribution
      role: 隐私安全的归因（无 Cookie）
    next: step-2
- id: step-2
  name: 人群精准化
  question: 是否需要区分不同人群的广告响应差异？
  context: 识别"可说服者"，避免对无效人群浪费预算
  branches:
  - condition: 需要个体级别的增量效应估计
    skills:
    - id: Skill-Uplift-Modeling
      role: T/X-Learner 元学习框架估计 CATE
    - id: Skill-Intelligent-Attribution-Causal-Forest
      role: 因果森林直接估计异质性处理效应
    - id: Skill-Guardrailed-Uplift-Targeting
      role: 带预算护栏的约束优化干预
    next: step-3
  - condition: 受众扩展 / Lookalike 优化
    skills:
    - id: Skill-Audience-Knowledge-Graph
      role: 知识图谱驱动的受众画像扩展
    - id: Skill-HGNN-Cross-Device-Matching
      role: 跨设备用户匹配
    next: step-3
- id: step-3
  name: 预算分配与竞价
  question: 是否需要自动化预算分配或实时竞价？
  context: 将前两步的因果洞察转化为可执行的预算决策
  branches:
  - condition: 多渠道预算静态分配
    skills:
    - id: Skill-ROAS-Budget-Optimization
      role: ROAS 约束下的多渠道预算优化
    - id: Skill-Multi-Objective-Budget-Allocation
      role: 多目标（GMV + 品牌 + ROI）预算分配
    - id: Skill-Marketing-Mix-Modeling
      role: MMM 量化各渠道饱和曲线
  - condition: 实时动态竞价（关键词 / 受众）
    skills:
    - id: Skill-LLM-AutoBidding-MAS
      role: LLM 驱动的层次化自动竞价
    - id: Skill-Multi-Armed-Bandit
      role: MAB 动态流量分配
    - id: Skill-HMMCB-Cross-Channel-Bidding
      role: 跨渠道隐马尔可夫竞价
- id: step-4
  name: 创意疲劳监控
  question: 广告创意是否出现效果衰减？
  skills:
  - id: Skill-Creative-Fatigue-Detection
    role: 检测创意疲劳拐点，触发轮换策略
  - id: Skill-Channel-Saturation-Curve
    role: 渠道饱和曲线建模，识别边际收益递减点
- id: step-measure
  name: 归因效果验证
  question: 归因优化后，如何证明 ROAS 改善是真实的而非平台自我报告的偏差？
  context: 每月做归因结果与实际 GMV 的对照，验证归因模型准确性
  skills:
  - id: Skill-Switchback-Experiment-Design
    role: 用 Switchback 实验验证归因模型准确性（ROI 1500万/年）
  - id: Skill-Identified-Bayesian-MMM
    role: 贝叶斯 MMM 做归因结果的宏观验证（ROI 1000万）
  - id: Skill-Multi-Task-Ad-CTR-CVR
    role: ESMM多任务CTR/CVR联合学习，解决CVR样本稀疏问题，CTCVR精度提升15%
  - id: Skill-RDD-Regression-Discontinuity-Design
    role: 断点回归设计，评估广告门槛策略（如出价>$X）的真实增量效果
outcomes:
- 归因准确率提升 30-40%，消除渠道预算错配
- 无效预算节约 10-20 万元/年（纠正归因偏差）
- 可说服用户定向精准率提升，优惠券成本节省 25-28 万/月
- 实时竞价系统响应延迟 < 50ms，CTR 提升 15-25%
