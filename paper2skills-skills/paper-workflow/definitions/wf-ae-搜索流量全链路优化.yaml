id: wf-ae
name: WF-AE 搜索流量全链路优化
description: 从SEO因果效果测量到多Agent搜索运营再到搜索流量财务归因的完整闭环，将搜索运营从经验驱动升级为数据驱动。
target_users:
- SEO负责人
- 搜索流量运营
- CMO
- 数据分析师
entry_question: 你的搜索运营当前最大问题是：SEO投入真实ROI不清晰？关键词排名监控太人工？还是搜索流量对P&L贡献无法量化？
steps:
- id: step-1
  name: SEO效果因果评估
  question: SEO优化后流量增加，但多少是真正由SEO带来的？
  context: 简单前后对比高估SEO效果约6-15pp（混入了市场自然增长），导致SEO预算决策失误
  skills:
  - id: Skill-Causal-SEO-Search-Attribution
    role: SEO排名对流量的因果估计，DiD去除共同趋势，年化预算优化60万元
  - id: Skill-Search-Organic-Growth-Attribution
    role: 有机搜索用户LTV溢价量化，PSM去偏后真实溢价28%，年化决策100万元
  - id: Skill-Causal-Time-Series-CausalImpact
    role: CausalImpact时序因果，精确量化Listing优化对搜索流量的冲击
- id: step-2
  name: 多Agent搜索排名实时监控
  question: 关键词排名是否有自动化监控和快速响应能力？
  context: 500个关键词人工监控做不到，而MAS可实现全量5分钟自动诊断并输出行动计划
  skills:
  - id: Skill-MAS-Search-Optimization
    role: MAS搜索优化，5分钟根因诊断，年化避免排名下滑流量损失80万元
  - id: Skill-Streaming-Analytics-Agent
    role: 实时流式告警，ADWIN检测流量异常2分钟内响应
  - id: Skill-Amazon-A10-Algorithm-Ranking
    role: A10算法排名因素分析，FBA库存/评分/广告协同优化自然排名
- id: step-3
  name: 搜索流量财务归因
  question: 搜索运营的成本和收益是否有完整的财务核算？
  context: 大多数品牌只知道有机流量占比，但无法向CFO解释SEO的利润贡献
  skills:
  - id: Skill-Search-Revenue-Attribution
    role: 搜索流量P&L归因，PSM去偏计算真实LTV增量，生成CFO级ROI报告
  - id: Skill-Multi-Step-Reasoning-BI
    role: 多步推理BI，20分钟自动生成搜索投入产出分析报告
  - id: Skill-LTV-Prediction-BTYD
    role: 搜索用户LTV预测，量化有机搜索用户的长期价值
- id: step-4
  name: 搜索与广告协同优化
  question: 自然搜索与付费广告是否形成了有效的协同增效关系？
  skills:
  - id: Skill-Sponsored-Organic-Rank-Synergy
    role: 广告-自然协同排名策略，两者互补最大化搜索可见性
  - id: Skill-DataAgent-Marketing-Attribution
    role: 多渠道归因Agent，区分广告和SEO各自贡献，优化预算分配
  - id: Skill-ROAS-Budget-Optimization
    role: ROAS预算优化，在搜索流量峰期动态调整广告出价
