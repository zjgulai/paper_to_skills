id: wf-e
name: WF-E Review监控
description: 从评论质量治理到虚假评论检测、品牌舆情监控的端到端 Review 运营链。
target_users:
  - 品牌运营
  - 数据质量工程师
  - 用户增长分析师
entry_question: 你的 Review 运营核心挑战？

steps:
  - id: step-1
    name: 数据采集与清洗
    question: 评论数据来源与规模？
    branches:
      - condition: Amazon / 主流电商平台
        skills:
          - id: Skill-Review-Dedup-Quality-Filter
            role: 评论去重、低质过滤、时效清洗
          - id: Skill-Ecommerce-Data-Quality-Assessment
            role: 电商数据质量综合评估
      - condition: 社交媒体 / UGC 内容
        skills:
          - id: Skill-AIGC-Content-Detection
            role: AI 生成内容检测与标记
          - id: Skill-Cultural-Data-Collection
            role: 跨文化 UGC 数据采集规范

  - id: step-2
    name: 虚假评论检测
    question: 是否存在刷评/竞对攻击？
    skills:
      - id: Skill-Fake-Review-Detection
        role: 多特征融合虚假评论分类
      - id: Skill-FraudSquad-LLM-Review-Detection
        role: LLM 增强的评论欺诈检测
      - id: Skill-DS-DGA-GCN-Fake-Review-Group
        role: GCN 图神经网络刷评群体检测

  - id: step-3
    name: 情感与主题分析
    question: 需要哪个深度的洞察？
    branches:
      - condition: 产品功能维度评分
        skills:
          - id: Skill-LACA-CrossLingual-ABSA
            role: 跨语言方面级情感分析
          - id: Skill-AGRS-Aspect-Guided-Review-Summarization
            role: 方面引导评论摘要
          - id: Skill-Review-Pain-Point-Mining
            role: 产品痛点聚类提炼
      - condition: 整体品牌舆情监控
        skills:
          - id: Skill-StaR-Review-Statement-Ranking
            role: 核心声明重要性排序
          - id: Skill-MAA-Review-to-Action-Decision
            role: 评论→产品改进行动转化

  - id: step-4
    name: 异常预警与响应
    question: 是否需要实时监控异常波动？
    skills:
      - id: Skill-Argos-Agentic-Anomaly-Detection
        role: Agentic 时序异常检测（评分骤降预警）
      - id: Skill-Consumer-Complaint-Recall-Prediction
        role: 投诉量异常 → 召回风险预测
      - id: Skill-Root-Cause-Analysis-Agent
        role: 差评根因自动归因分析

outcomes:
  - 虚假评论识别准确率 > 90%，保护品牌评分真实性
  - 产品改进信号提取周期从 2 周缩短至实时
  - 多语言覆盖率 100%，不遗漏非英语市场反馈
  - 召回风险提前 2-4 周预警，降低合规损失
