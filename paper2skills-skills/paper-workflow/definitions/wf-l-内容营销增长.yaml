id: wf-l
name: WF-L 内容营销增长
description: 从 KOL 选择到内容创作再到 ROI 归因的跨平台内容营销全链路决策。
target_users:
- 内容营销负责人
- KOL 合作运营
- 短视频/直播运营
entry_question: 内容营销当前最大的ROI漏洞在哪里？
steps:
- id: step-1
  name: KOL 选择与匹配
  question: 如何找到最匹配品牌的 KOL？
  context: 科学评估 KOL 价值，避免凭感觉投放
  branches:
  - condition: TikTok/Instagram KOL 合作
    skills:
    - id: Skill-KOL-Creator-Matching
      role: 多维度 KOL 匹配模型，品牌受众契合度评分
    - id: Skill-Creator-Economy-ROI-Model
      role: KOL 带货 ROI 预测，投放前估算收益
    - id: Skill-KOL-ROI-Causal-Attribution
      role: 因果归因，区分 KOL 增量 vs 自然购买
  - condition: 直播带货（TikTok Shop/抖音）
    skills:
    - id: Skill-Live-Commerce-Stream-Algorithm
      role: 直播算法建模，前15分钟策略触发扩量
    - id: Skill-Video-ROI-Attribution
      role: 直播/视频 ROI 归因
- id: step-2
  name: 内容创作与优化
  question: 如何高效创作高转化内容？
  context: AI 辅助内容创作，降低内容生产成本
  branches:
  - condition: 产品图片/主图优化
    skills:
    - id: Skill-AIGC-Revenue-Attribution
      role: AI 内容 ROI 归因，验证 AI 图能否替代人工摄影
    - id: Skill-Aquarius-Brand-Video-Generation
      role: AI 品牌视频生成，快速产出产品视频
  - condition: 文案/Listing 内容创作
    skills:
    - id: Skill-Listing-AI-Copywriting
      role: AI 文案生成，关键词自然融入
    - id: Skill-Multilingual-Listing-Localization
      role: 多语言本地化，3天完成6市场
- id: step-3
  name: 内容分发与放大
  question: 哪个平台的内容分发效率最高？
  context: 平台算法感知与内容分发策略
  branches:
  - condition: TikTok 短视频
    skills:
    - id: Skill-TikTok-Algorithm-Content-Boost
      role: TikTok 算法机制与流量加速策略
    - id: Skill-GEO-Generative-Engine-Optimization
      role: AI 搜索引擎优化，内容被 ChatGPT/Perplexity 引用
  - condition: Amazon 平台内容
    skills:
    - id: Skill-Amazon-External-Traffic-Boost
      role: 站外流量引入 Amazon，提升 A10 排名权重
    - id: Skill-SEO-Organic-Ranking-Optimization
      role: SEO 自然排名优化，长期流量积累
- id: step-4
  name: 内容 ROI 归因与优化
  question: 哪类内容和 KOL 带来了最高 ROI？
  context: 闭环数据驱动，持续优化内容投资策略
  branches:
  - condition: 全渠道内容归因
    skills:
    - id: Skill-DTC-Customer-Acquisition-Attribution
      role: 多触点归因，量化内容在转化链中的贡献
    - id: Skill-Post-Purchase-Email-Sequence-Optimizer
      role: 购后邮件序列，延伸内容触达价值
  - condition: 内容投资组合优化
    skills:
    - id: Skill-Marketing-Mix-Modeling
      role: MMM 量化内容渠道的长期品牌 ROI
    - id: Skill-Channel-Saturation-Curve
      role: 内容渠道饱和曲线，防止过度投入某一渠道
outcomes:
- KOL 合作 ROI 从感性判断到数据驱动，误判率降低 60%
- AI 内容生产成本降低 80%，内容量提升 5-10x
- TikTok 直播 GMV 从 $2K → $8K（算法优化）
- 全渠道内容 ROI 归因准确，预算分配效率提升 25%
