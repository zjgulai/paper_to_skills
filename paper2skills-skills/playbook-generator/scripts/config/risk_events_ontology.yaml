      sequence: 3
    - skill_id: Skill-Causal-Churn-Retention-Attribution
      role: 因果归因：流失是价格/产品/竞品/服务哪个因素驱动
      sequence: 4
    - skill_id: Skill-Deep-Learning-Churn-Prediction
      role: Skill-Deep-Learning-Churn-Prediction
      sequence: 5
    - skill_id: Skill-Uplift-Churn-Prediction
      role: Skill-Uplift-Churn-Prediction
      sequence: 6
