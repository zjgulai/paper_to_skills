      role: 30日留存<40% → 自动触发差异化挽回序列（邮件/客服/优惠券）
      condition: 30日留存率 < 40%
    - skill_id: Skill-High-Value-Customer-Alert-Action
      role: Champions 用户 30 天沉默 → 触发客服主动介入 + 个性化钩子
      condition: 高 RFM 评分用户 30 天无购买
    - skill_id: Skill-Uplift-Intervention-Priority-Queue
      role: Uplift 分数 × LTV 排序，资源约束下优先干预最高价值可影响用户
      condition: 干预资源有限（预算 / 客服人力）
    - skill_id: Skill-Email-Sequence-Multiarm-Optimizer
      role: 多臂老虎机优化挽回邮件序列，自动找出最高 CTR 话术
    - skill_id: Skill-Combo-Customer-Churn-Recovery
      role: 从流失预测到精准干预的 5 步完整链路
    - skill_id: Skill-LTV-Acquisition-Budget-Gate
      role: LTV/CAC比值驱动的获客预算自动开闸/熔断决策器
    - skill_id: Skill-RFM-Campaign-Auto-Dispatcher
      role: 按RFM分群自动映射并触发差异化营销序列
    - skill_id: Skill-RFM-Segment-Campaign-Dispatcher
      role: RFM分群结果自动触发差异化营销序列调度器
