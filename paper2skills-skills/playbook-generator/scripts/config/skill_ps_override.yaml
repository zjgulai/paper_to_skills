# 规范：跨学科/反直觉解法的 PS_Override 编写标准 (v2.0 - 2026-06-20)
# 传统格式：{业务角色}面临{具体场景}——{方法}将{A}改善为{B}，年化{ROI数字}
# 高阶格式：{业务角色}陷入{同质化内卷困境}——引入{跨学科/反直觉解法（如流行病学/金融高频模型）}，发现{传统认知盲区}，最终实现{降维打击的差异化 ROI}。
# 示例 1 (跨域降维): 运营陷入TikTok爆款流量预测困境——引入传染病流行病学(SIR)模型，将流量看作病毒传播，提前2周锁定爆发拐点，备货周转率提升30%。
# 示例 2 (反直觉): 财务面临黑五价格战绞杀——引入反事实推演(Do-Calculus)，反直觉切断广告维持高价，利用竞品断货真空期攫取50%超额溢价。
