# 一、标签准入条件（必须全部满足）

准入条件:
  1. 可识别性: 高（有明确关键词边界，不与现有标签混淆）
  2. 归因清晰度: 高（命中后可直接归因到业务动作）
  3. 情感方向: 明确（正向/负向/中性，不能模糊）
  4. 覆盖率预估: ≥0.5%（在对应数据源中可命中）
  5. 业务价值: 有明确主责部门和处理动作
  6. 非品类关键词: 不是单纯的产品类别名词

---
# 二、候选池构建（基于算法发现 + 业务需求）

候选池来源:
  - 来源1: v3.5分析阶段算法发现标签（~84个，分布于4品线）
  - 来源2: 竞品分析发现的缺失标签
  - 来源3: 客服高频问题未覆盖的标签
  - 来源4: 社媒listening发现的新兴问题

候选池分类:

## 类别A: 品类关键词（不进入VOC情感标签库）

说明: 这些是产品类别/型号名称，用于产品分类，不用于情感分析

智能母婴电器品类关键词:
  - nasal_aspirator / 吸鼻器 → 转为品类识别标签
  - baby_stroller / 推车 → 转为品类识别标签
  - air_purifier / 空气净化器 → 转为品类识别标签
  - wooden_high / 成长型餐椅 → 转为品类识别标签
  - para_beb / 婴儿用（西班牙语通用词）→ 转为品类识别标签
  - electric_nasal / 电动吸鼻器 → 转为品类识别标签
  - baby_nail / 婴儿指甲 → 转为品类识别标签
  - breast_milk / 母乳 → 删除（过于宽泛，会与大量评论共现）

预计处理: 7个转品类识别标签，1个删除

