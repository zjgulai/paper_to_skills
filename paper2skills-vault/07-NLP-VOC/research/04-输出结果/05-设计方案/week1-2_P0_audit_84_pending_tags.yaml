---
# 三、审核决策树

decision_tree:
  step1:
    问题: 是否是产品类别关键词？
    yes: 转为品类识别标签，不进入VOC情感标签库
    no: → step2
  step2:
    问题: 是否有明确的情感方向？
    yes: → step3
    no: 需要业务审核
      审核通过: → step3
      审核不通过: 删除或归档
  step3:
    问题: 是否满足全部准入条件？
    yes: 进入正式标签库
      补充: AIPL节点、情感极性、标签主题、关键词、主责部门、优先级
    no: 返回修改或删除

