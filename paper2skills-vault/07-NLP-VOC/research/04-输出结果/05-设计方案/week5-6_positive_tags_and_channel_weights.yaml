# 自我审计报告

audit_item: 正向标签 + 渠道权重设计
audit_time: 2026-04-23

正向标签审计:
  总计: 47个品线正向标签
  吸奶器: 15个 (L1=13, P1=1, I=1) ✓
  内衣服饰: 12个 (L1=11, P1=1) ✓
  喂养电器: 10个 (L1=10) ✓
  智能母婴电器: 10个 (L1=9, P1=1) ✓

  关键词检查:
    - 每个标签有5-10个关键词 ✓
    - 关键词与品线特性匹配 ✓
    - 无与负向标签关键词重叠 ✓

  业务价值检查:
    - Promoter相关性高的标签: 吸奶器吸力/静音/不漏奶, 智能母婴画质/连接/隐私 ✓
    - 痛点反向标签: 清洗方便(对应清洗困难), 不漏奶(对应漏奶) ✓

渠道权重审计:
  矩阵检查:
    - 6品线均有差异化权重 ✓
    - 权重范围在0.5-2.0之间 ✓
    - 内衣服饰退货留言权重最高(1.8): 合理，服饰退货率高 ✓
    - 智能母婴客服权重最高(1.5): 合理，科技产品技术支持需求高 ✓

  标签级权重检查:
    - 退货留言权重范围: 0.0(推荐标签)-1.8(尺码) ✓
    - 不合理组合检查: 无 ✓
    - 正向标签在退货留言中权重为0或很低: 合理 ✓

风险标记:
  - 正向标签的情感抽取精度可能低于负向标签（用户较少明确表达"好"）
  - 建议: 正向标签使用更宽松的匹配阈值，或引入星级评分作为辅助信号
  - 渠道权重需要历史数据回测验证，当前为理论设计

状态: PASS — 可执行，建议配套正向标签抽取模型调优一起上线
