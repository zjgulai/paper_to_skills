---
# 第二部分: 503标签渠道权重配置

channel_weight_design:
  version: v3.6-channel-v1.0
  data_sources:
    - return_note    # 退货留言
    - ticket         # 客服工单
    - review         # 商品评论
    - trustpilot     # Trustpilot评价

  weight_range: [0.0, 2.0]
  default_weights:
    return_note: 1.5   # 退货行为是高强度信号
    ticket: 1.3        # 客服联系是主动反馈
    review: 1.0        # 评论是基线信号
    trustpilot: 1.2    # 第三方评价公信度高

---
# 第三部分: 6品线×4数据源渠道权重矩阵

channel_weight_matrix:
  # 矩阵设计原则:
  # 1. 退货留言: 退货是高成本行为，权重最高
  # 2. 客服工单: 用户主动寻求帮助，权重次高
  # 3. 商品评论: 最大数据源，作为基线权重1.0
  # 4. Trustpilot: 第三方公信度高，但样本量小

  吸奶器:
    return_note: 1.5
    ticket: 1.3
    review: 1.0
    trustpilot: 1.2
    rationale: "吸奶器是核心品线，退货成本高，退货留言权重最高"

  内衣服饰:
    return_note: 1.8
    ticket: 1.2
    review: 1.0
    trustpilot: 1.1
    rationale: "服饰退货率高，退货留言是最强信号；尺码问题是退货主因"

  家居家纺:
    return_note: 1.4
    ticket: 1.2
    review: 1.0
    trustpilot: 1.3
    rationale: "家纺品线Trustpilot评价对品牌影响大"

  母婴综合护理:
    return_note: 1.6
    ticket: 1.4
    review: 1.0
    trustpilot: 1.2
    rationale: "护理品线涉及安全，客服工单权重高"

  喂养电器:
    return_note: 1.5
    ticket: 1.3
    review: 1.0
    trustpilot: 1.2
    rationale: "电器品线退货+客服双重高权重"

  智能母婴电器:
    return_note: 1.4
    ticket: 1.5
    review: 1.0
    trustpilot: 1.4
    rationale: "智能设备技术支持需求高，客服权重最高；Trustpilot对科技产品影响大"

---
# 第四部分: 标签级渠道权重差异化

# 不同标签在不同数据源中的权重可以进一步差异化
# 示例: "物流延迟"标签在return_note中权重1.5, 在review中权重1.0

tag_level_weight_examples:
  - tag_name: 物流延迟
    weights:
      return_note: 1.5   # 退货理由中的物流延迟是高强度信号
      ticket: 1.3        # 客服投诉物流
      review: 1.0        # 评论中提及物流
      trustpilot: 1.2    # 第三方评价中提及物流

  - tag_name: 尺码偏小
    weights:
      return_note: 1.8   # 退货理由是尺码问题的最强信号
      ticket: 1.2        # 客服咨询尺码
      review: 1.0        # 评论中提及尺码
      trustpilot: 1.1    # 第三方评价中提及尺码

  - tag_name: 吸力不足
    weights:
      return_note: 1.5
      ticket: 1.4
      review: 1.0
      trustpilot: 1.3

  - tag_name: 噪音太大
    weights:
      return_note: 1.3
      ticket: 1.2
      review: 1.0
      trustpilot: 1.2

  - tag_name: 价格过高
    weights:
      return_note: 1.2   # 退货中价格因素较少
      ticket: 1.1
      review: 1.0
      trustpilot: 1.0

  - tag_name: 强烈推荐
    weights:
      return_note: 0.0   # 退货留言不可能有推荐
      ticket: 0.5        # 客服中偶尔有推荐
      review: 1.0        # 评论是推荐主数据源
      trustpilot: 1.5    # 第三方推荐公信度最高

