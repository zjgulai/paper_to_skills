# 自我审计报告

审计项目: 17个低分标签修复方案
审计时间: 2026-04-23
审计标准:
  1. 修复后预计评分是否>60
  2. 拆分标签之间是否有明确互斥规则
  3. 合并标签是否语义完全重叠
  4. 删除标签是否有明确归属

逐项审计:
  - 预计评分≥70: 5个修复
  - 预计评分65-69: 9个修复
  - 预计评分60-64: 2个修复
  - 预计评分<60或删除: 1个修复（TAG_L1_203降级）

  互斥规则检查:
    - TAG_L1_035A vs TAG_L1_035B: 部位限定词互斥 ✓
    - TAG_P2_034A/B/C: 问题类型互斥（缺失/滞后/错误）✓
    - TAG_P2_035A/B/C: 阶段互斥（发货/运输/配送）✓
    - TAG_P2_019A vs TAG_P2_019B: 原因互斥（缺货/主动）✓
    - TAG_P2_030A vs TAG_P2_030B: 责任方互斥（承运人/投递员）✓

  合并合理性检查:
    - TAG_L1_014→TAG_L1_035B: 充电口烧焦是烧焦的子集 ✓
    - TAG_L1_039→TAG_L1_035A: 安规由安全标签独立处理 ✓
    - TAG_P2_028→TAG_P2_035B: 运输时间太长=运输时长超预期 ✓
    - TAG_P2_012→TAG_P2_005C: 收到礼物场景统一 ✓

风险标记:
  - TAG_L1_203: 若扩大后仍<1%覆盖率，建议直接删除而非降级
  - TAG_P2_026: 0.18%覆盖率极低，即使扩展后可能仍<1%，需监控

状态: PASS with WATCH — 可执行，需监控TAG_L1_203和TAG_P2_026的覆盖率
