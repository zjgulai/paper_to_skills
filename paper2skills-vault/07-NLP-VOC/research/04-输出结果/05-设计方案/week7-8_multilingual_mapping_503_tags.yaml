# 三、语言特性差异处理规则

language_specific_rules:
  english:
    regional_variants:
      US: [" Moms", "pump", "nursing bra", "diaper", "stroller"]
      UK: [" Mums", "breast pump", "maternity bra", "nappy", "pram"]
      CA: [mixed US/UK usage]
    handling: "维护US/UK/CA三个关键词变体，通过正则匹配覆盖"

  spanish:
    regional_variants:
      latam:
        吸奶器: ["sacaleches", "extractor de leche"]
        哺乳文胸: ["sostén de lactancia", "brasier de lactancia"]
        尿布: ["pañal"]
      spain:
        吸奶器: ["extractor de leche", "sacaleches"]
        哺乳文胸: ["sujetador de lactancia", "reggiseno allattamento"]
        尿布: ["pañal"]
    handling: "拉美/西班牙双版本维护，AI翻译时指定target locale"

  french:
    regional_variants:
      france: ["tire-lait", "soutien-gorge d'allaitement"]
      quebec: ["extracteur de lait", "soutien-gorge d'allaitement"]
    handling: "法国/魁北克基本一致，差异小，统一维护"

  german:
    characteristics:
      - "复合词多，用户倾向使用完整词"
      - "对噪音容忍度低，'zu laut'提及率35%高于其他语言"
      - "技术规格关注度高"
    handling: "保留复合词形式；噪音相关标签增加德语变体"

