# 四、翻译模板库（P3低频标签使用）

translation_templates:
  pattern_broken:
    zh: "{部件}破损"
    en: "{part} broke / {part} cracked / {part} damaged"
    es: "{parte} se rompió / {parte} agrietado / {parte} dañado"
    fr: "{pièce} cassé / {pièce} fissuré / {pièce} endommagé"

  pattern_not_working:
    zh: "{功能}不工作"
    en: "{feature} not working / {feature} broken / {feature} stopped"
    es: "{función} no funciona / {función} dejó de funcionar"
    fr: "{fonction} ne fonctionne pas / {fonction} en panne"

