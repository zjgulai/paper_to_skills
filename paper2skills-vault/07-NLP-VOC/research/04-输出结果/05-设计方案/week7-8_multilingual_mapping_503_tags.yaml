# Week 7-8 全量503标签多语言映射方案
# 审计时间: 2026-04-23
# 数据来源: tag_dictionary_v3.5_final.xlsx 全部503标签
# 覆盖语言: 英/西/法/德（分级覆盖）

---
# 一、分级覆盖策略

strategy_version: v3.6-ml-v1.0
principle: "不是全部503标签都补充4语言——按优先级分级，资源集中在高业务价值标签"

tier_definition:
  P0:
    tag_types: [安全相关, 极高风险标签, P0优先级标签]
    tag_count: "~20"
    languages: [英文, 西班牙文, 法文, 德文, 荷兰文, 意大利文]
    method: 人工精译
    quality_gate: "业务+法务+本地化团队三方校对"
    delivery_format: "关键词列表 + 语境说明 + 禁用词"

  P1:
    tag_types: [高频业务标签, Top 100按命中率排序]
    tag_count: 100
    languages: [英文, 西班牙文, 法文, 德文]
    method: "AI翻译(DeepL API) + 业务团队逐条校对"
    quality_gate: "逐条校对，重点校验西班牙文（拉美vs西班牙差异）"
    delivery_format: "关键词列表 + 同义词扩展"

  P2:
    tag_types: [中频标签, Top 101-250]
    tag_count: 150
    languages: [英文, 西班牙文, 法文]
    method: "AI翻译 + 抽样20%人工校对"
    quality_gate: "抽检合格率≥90%则全量通过，否则回退到P1流程"
    delivery_format: 关键词列表

  P3:
    tag_types: [低频标签, 251-503]
    tag_count: 253
    languages: [英文, 西班牙文模板]
    method: "AI批量翻译 + 翻译模板库"
    quality_gate: "模板匹配率≥80%，不匹配的手动处理"
    delivery_format: "模板化关键词（如'XX破损'→'XX broke/cracked'）"

