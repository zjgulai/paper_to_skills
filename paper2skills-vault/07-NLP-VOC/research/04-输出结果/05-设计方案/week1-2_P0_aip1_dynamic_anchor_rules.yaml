# 三、规则冲突处理机制

conflict_resolution:
  场景: 同一条文本匹配多条规则
  处理逻辑:
    1. 取priority最高的规则（P0 > P1 > P2 > P3）
    2. 同priority取weight_multiplier最高的规则
    3. 若仍冲突，取default_aip1不变
    4. 记录冲突日志，供人工审核

  示例:
    文本: "The shipping was delayed and my baby arrived early, very disappointed"
    匹配规则:
      - R1_P0: 预产期前未送达 → L1, 权重1.5
      - R1_P1: 订单取消 → P2, 权重1.5
    结果: 取P0规则 → 保持L1，权重1.5
    理由: P0安全/紧急规则无条件优先

---
# 四、规则生效验证方法

validation:
  方法1: 历史数据回测
    - 取过去3个月已标注数据
    - 应用动态规则重新计算AIPL
    - 对比人工标注结果，计算准确率
    - 目标: 动态调整后AIPL准确率 ≥ 85%

  方法2: A/B测试
    - A组: 静态AIPL（default）
    - B组: 动态AIPL（应用规则库）
    - 对比两组在业务指标上的差异
    - 目标: B组在AIPL漏斗分析的准确度上有显著提升

  方法3: 规则覆盖率监控
    - 每周统计各规则的触发次数
    - 触发率<1%的规则标记为"低效用"
    - 连续4周触发率为0的规则自动下线

