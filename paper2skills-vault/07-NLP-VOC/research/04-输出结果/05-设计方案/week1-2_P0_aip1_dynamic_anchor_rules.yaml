---
# 一、动态锚定引擎设计

engine_design:
  输入:
    - 标签命中结果（标签ID + 置信度）
    - 原始文本内容
    - 数据源类型（review/ticket/return_note/order_data/qa/pre_sale/social/ad）
    - 用户画像（如有）
    - 时间戳

  处理流程:
    step1: 获取标签默认AIPL节点
    step2: 按优先级顺序匹配动态规则（P0规则优先于P1规则）
    step3: 若匹配多条规则，取权重倍率最高的规则
    step4: 计算最终权重 = 基础权重 × 权重倍率
    step5: 输出: 调整后AIPL节点 + 最终权重 + 调整理由

  规则优先级:
    P0: 安全相关规则（无条件优先）
    P1: 订单状态规则
    P2: 文本内容规则
    P3: 数据源类型规则

