# 二、Top 20高频标签动态锚定规则

## 规则1: 物流延迟

tag_id: TAG_P2_024
tag_name: 物流延迟
default_aip1: L1
frequency_rank: 1
hit_count_estimate: ~1500/月

rules:
  - rule_id: R1_P0
    priority: P0
    condition: text_contains_any(["before baby arrived", "due date", "baby came early"])
    adjusted_aip1: L1
    weight_multiplier: 1.5
    reason: 预产期前未送达 → 最高情感强度场景
    action: 自动升级优先级为P0，通知客服部紧急处理

  - rule_id: R1_P1
    priority: P1
    condition: source_type == "order_data" AND order_status == "已取消"
    adjusted_aip1: P2
    weight_multiplier: 1.5
    reason: 取消订单时的物流延迟 → 购买决策失败
    action: 归因到"购买决策阻碍"分析

  - rule_id: R1_P2
    priority: P2
    condition: text_contains_any(["compared with", "vs", "alternative"]) AND text_contains("shipping")
    adjusted_aip1: I
    weight_multiplier: 1.2
    reason: 对比时提及物流 → 影响兴趣阶段
    action: 竞品对比分析输入

  - rule_id: R1_P3
    priority: P3
    condition: source_type == "review" AND text_contains_any(["arrived", "received", "got it"])
    adjusted_aip1: L1
    weight_multiplier: 1.0
    reason: 收货后评论提及物流 → 保持L1
    action: 无调整

